version: '3.8'

services:
  influxdb:
    image: influxdb:2.7-alpine
    container_name: adaptive_db
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_RETENTION=1h
    volumes:
      - influx_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adaptive-discovery:
    build: ./discovery
    container_name: discovery_daemon
    restart: unless-stopped
    network_mode: "host"
    privileged: true
    env_file: .env
    environment:
      - INFLUXDB_URL=http://127.0.0.1:8086
    volumes:
      - ./shared_config:/etc/telegraf_dynamic
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      influxdb:
        condition: service_healthy

  telegraf:
    image: telegraf:1.30-alpine
    container_name: adaptive_telegraf
    restart: unless-stopped
    network_mode: "host"
    privileged: true
    volumes:
      - ./shared_config/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    depends_on:
      - adaptive-discovery

  grafana:
    image: grafana/grafana-oss:latest
    container_name: adaptive_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/network-lens.json
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - influxdb

volumes:
  influx_data:
  grafana_data:
