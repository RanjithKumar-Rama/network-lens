apiVersion: 1

datasources:
  - name: InfluxDB-Adaptive
    uid: influxdb-adaptive
    type: influxdb
    access: proxy
    url: http://adaptive_db:8086
    isDefault: true
    editable: false
    jsonData:
      version: Flux
      organization: $INFLUXDB_ORG
      defaultBucket: $INFLUXDB_BUCKET
      tlsSkipVerify: true
    secureJsonData:
      token: $INFLUXDB_TOKEN
